name: Frontend DAST

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "new_devsecops_pipelines"
  workflow_dispatch:

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start preview server
        run: npm run preview:ci > preview.log 2>&1 &

      - name: Wait for preview server
        run: npx wait-on http://127.0.0.1:4173

      - name: Run OWASP ZAP baseline scan
        run: |
          docker run --rm --network host \
            -v "${GITHUB_WORKSPACE}:/zap/wrk/:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://127.0.0.1:4173 \
            -J zap-report.json \
            -r zap-report.html \
            -w zap-report.md \
            -m 5

      - name: Upload ZAP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            zap-report.json
            zap-report.html
            zap-report.md
            preview.log
          retention-days: 7
