name: Frontend Scheduled DAST (OWASP ZAP)

on:
  schedule:
    # GitHub cron uses UTC. This runs daily at 02:00 Asia/Singapore.
    - cron: '0 18 * * *'
  workflow_dispatch:

env:
  DAST_TARGET_URL: ${{ vars.FRONTEND_LIVE_URL || 'https://salmon-island-0f8625f00.6.azurestaticapps.net' }}

jobs:
  dast:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for live site
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error --location "$DAST_TARGET_URL" > /dev/null; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for $DAST_TARGET_URL"
          exit 1

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@2b5fc7f98d837319798ab7f128ea50b7d40563b6
        with:
          target: ${{ env.DAST_TARGET_URL }}
          fail_action: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report-${{ github.run_number }}
          path: report_html.html
          retention-days: 30
