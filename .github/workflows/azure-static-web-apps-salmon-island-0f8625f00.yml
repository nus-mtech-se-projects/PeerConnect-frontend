name: Azure Static Web Apps CI/CD

on:
  workflow_run:
    workflows: ["Frontend UAT (Playwright)"]
    types: [completed]
    branches: [main]

concurrency:
  group: azure-static-web-apps-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'workflow_run'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read

    env:
      VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
      VITE_MSAL_CLIENT_ID: ${{ secrets.VITE_MSAL_CLIENT_ID }}

    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: true
          lfs: false

      - name: Install OIDC Client from Core Package
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
          script: |
            const coredemo = require('@actions/core')
            return await coredemo.getIDToken()
          result-encoding: string

      - name: Show env check
        run: |
          echo "VITE_API_BASE=$VITE_API_BASE"
          echo "VITE_MSAL_CLIENT_ID=$VITE_MSAL_CLIENT_ID"

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_ISLAND_0F8625F00 }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "dist"
          github_id_token: ${{ steps.idtoken.outputs.result }}
