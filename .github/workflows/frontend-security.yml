name: Frontend Security (SonarQube Docker)

on:
  pull_request:
    branches: [ main ]
  push:
    branches:
      - main
      - "new_devsecops_pipelines"
  workflow_dispatch:

concurrency:
  group: frontend-sonar-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Test (coverage)
        run: npm test -- --coverage
        env:
          CI: true
      - name: Start SonarQube
        run: |
          docker rm -f sonarqube 2>/dev/null || true
          docker run -d --name sonarqube -p 9000:9000 \
            -e SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true \
            sonarqube:lts-community
          echo "Waiting 30s for SonarQube to initialise..."
          sleep 30
      - name: Wait for SonarQube (health)
        run: |
          for i in {1..240}; do
            for host in localhost sonarqube host.docker.internal; do
              if curl -fsS "http://${host}:9000/api/system/status" 2>/dev/null | grep -q '"status":"UP"'; then
                echo "SonarQube is UP at ${host}"
                echo "SONAR_HOST=${host}" >> "$GITHUB_ENV"
                echo "SONAR_HOST_URL=http://${host}:9000" >> "$GITHUB_ENV"
                exit 0
              fi
            done
            if [ $((i % 30)) -eq 0 ]; then
              echo "Still waiting for SonarQube... (${i}/240)"
            fi
            sleep 2
          done
          echo "SonarQube not reachable on localhost, sonarqube, or host.docker.internal"
          exit 1

      # Generate a real token (so scan-action works)
      - name: Create Sonar token (runtime)
        id: token
        run: |
          : "${SONAR_HOST_URL:=http://localhost:9000}"
          TOKEN_JSON=$(curl -fsS -u admin:admin -X POST \
            "${SONAR_HOST_URL}/api/user_tokens/generate" \
            -d "name=ci-token-$(date +%s)")
          SONAR_TOKEN=$(echo "$TOKEN_JSON" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          if [ -z "$SONAR_TOKEN" ]; then
            echo "Failed to generate token: $TOKEN_JSON"
            exit 1
          fi
          echo "sonar_token=$SONAR_TOKEN" >> "$GITHUB_OUTPUT"

      - name: SonarQube Scan
        run: npx -y sonarqube-scanner -Dsonar.projectKey=peerconnect-frontend -Dsonar.sources=src -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info -Dsonar.host.url="${{ env.SONAR_HOST_URL || 'http://localhost:9000' }}" -Dsonar.login="${{ steps.token.outputs.sonar_token }}" -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ steps.token.outputs.sonar_token }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL || 'http://localhost:9000' }}

      - name: Export SonarQube Report
        if: always()
        run: curl -fsS -u admin:admin "${{ env.SONAR_HOST_URL || 'http://localhost:9000' }}/api/issues/search?componentKeys=peerconnect-frontend" > sonarqube-report.json

      - name: Upload SonarQube Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sonarqube-report
          path: sonarqube-report.json
